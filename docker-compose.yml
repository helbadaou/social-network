version: '3.8'

services:
  # Backend Go
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: backend
    ports:
      - "8080:8080"
    volumes:
      # Persister la base de données dans /root/data
      - backend-data:/root/data
      - backend-uploads:/root/uploads
    environment:
      - PORT=8080
    networks:
      - social-network
    restart: unless-stopped

  # Frontend Next.js
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8080
      - NEXT_PUBLIC_WS_URL=ws://localhost:8080/ws
    depends_on:
      - backend
    networks:
      - social-network
    restart: unless-stopped

# Volumes pour persister les données
volumes:
  backend-data:
    driver: local
  backend-uploads:
    driver: local

# Réseau pour la communication entre services
networks:
  social-network:
    driver: bridge