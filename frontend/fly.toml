app = "social-network-frontend-helbadao"
primary_region = "cdg"

[build]
  dockerfile = "Dockerfile"

  [build.args]
    NEXT_PUBLIC_API_URL = "https://social-network-backend-helbadao.fly.dev"
    NEXT_PUBLIC_WS_URL = "wss://social-network-backend-helbadao.fly.dev/ws"

[env]
  PORT = "3000"
  # Update this to your backend Fly URL
  NEXT_PUBLIC_API_URL = "https://social-network-backend-helbadao.fly.dev"
  # Update this to your backend Fly URL
  NEXT_PUBLIC_WS_URL = "wss://social-network-backend-helbadao.fly.dev/ws"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]
